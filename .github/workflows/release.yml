name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"       # git tag v1.2.3 && git push --tags
  workflow_dispatch:   # manual run from the Actions UI

jobs:
  # ── Windows .exe ──────────────────────────────────────────────────────────────
  build-windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build React frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Download FFmpeg (Windows)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zip = "$env:TEMP\ffmpeg_win.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\ffmpeg_extract" -Force
          New-Item -ItemType Directory -Force -Path ffmpeg_bin | Out-Null
          $ffmpeg  = Get-ChildItem "$env:TEMP\ffmpeg_extract" -Recurse -Filter "ffmpeg.exe"  | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:TEMP\ffmpeg_extract" -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $ffmpeg.FullName  -Destination "ffmpeg_bin\ffmpeg.exe"
          Copy-Item $ffprobe.FullName -Destination "ffmpeg_bin\ffprobe.exe"
          Write-Host "ffmpeg:  $(ffmpeg_bin\ffmpeg.exe  -version 2>&1 | Select-Object -First 1)"
          Write-Host "ffprobe: $(ffmpeg_bin\ffprobe.exe -version 2>&1 | Select-Object -First 1)"

      - name: Build backend (PyInstaller)
        working-directory: backend
        run: |
          pip install -r requirements.txt -q
          pip install pyinstaller -q
          pyinstaller scriptovideo.spec --noconfirm

      - name: Build & publish Windows installer
        working-directory: electron
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          npm ci
          npx electron-builder --win --publish always

  # ── macOS .dmg ────────────────────────────────────────────────────────────────
  build-mac:
    name: macOS DMG
    runs-on: macos-13          # last Intel x64 runner (stable DMG support)
    needs: build-windows       # run after Windows so the release already exists

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate icon.icns from icon.png
        run: |
          mkdir -p electron/assets/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size electron/assets/icon.png \
              --out "electron/assets/icon.iconset/icon_${size}x${size}.png" --out-format png 2>/dev/null || true
          done
          # @2x variants
          sips -z 32  32  electron/assets/icon.png --out electron/assets/icon.iconset/icon_16x16@2x.png  2>/dev/null || true
          sips -z 64  64  electron/assets/icon.png --out electron/assets/icon.iconset/icon_32x32@2x.png  2>/dev/null || true
          sips -z 256 256 electron/assets/icon.png --out electron/assets/icon.iconset/icon_128x128@2x.png 2>/dev/null || true
          sips -z 512 512 electron/assets/icon.png --out electron/assets/icon.iconset/icon_256x256@2x.png 2>/dev/null || true
          iconutil -c icns electron/assets/icon.iconset --output electron/assets/icon.icns
          echo "icon.icns generated ✓"

      - name: Build React frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Download FFmpeg + FFprobe (macOS x64)
        run: |
          mkdir -p ffmpeg_bin
          # ffmpeg
          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_mac/
          cp /tmp/ffmpeg_mac/ffmpeg ffmpeg_bin/ffmpeg
          chmod +x ffmpeg_bin/ffmpeg
          # ffprobe
          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o /tmp/ffprobe.zip
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe_mac/
          cp /tmp/ffprobe_mac/ffprobe ffmpeg_bin/ffprobe
          chmod +x ffmpeg_bin/ffprobe
          echo "ffmpeg:  $(ffmpeg_bin/ffmpeg  -version 2>&1 | head -1)"
          echo "ffprobe: $(ffmpeg_bin/ffprobe -version 2>&1 | head -1)"

      - name: Build backend (PyInstaller)
        working-directory: backend
        run: |
          pip3 install -r requirements.txt -q
          pip3 install pyinstaller -q
          pyinstaller scriptovideo.spec --noconfirm

      - name: Build & publish macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"   # skip code signing (no Apple cert)
        run: |
          npm ci
          npx electron-builder --mac --publish always
