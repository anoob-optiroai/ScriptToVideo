name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"          # triggered by: git tag v1.2.3 && git push --tags
  workflow_dispatch:       # allow manual run from GitHub Actions UI
    inputs:
      publish:
        description: "Publish to GitHub Releases?"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  # ── Windows .exe ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 1. Build React frontend ───────────────────────────────────────────
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── 2. Build PyInstaller backend ──────────────────────────────────────
      - name: Build backend
        working-directory: backend
        run: |
          pip install -r requirements.txt -q
          pip install pyinstaller -q
          pyinstaller scriptovideo.spec --noconfirm

      # ── 3. Download FFmpeg for Windows ────────────────────────────────────
      - name: Download FFmpeg (Windows)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zip = "$env:TEMP\ffmpeg_win.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\ffmpeg_extract" -Force
          $exe = Get-ChildItem "$env:TEMP\ffmpeg_extract" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path ffmpeg_bin | Out-Null
          Copy-Item $exe.FullName -Destination "ffmpeg_bin\ffmpeg.exe"

      # ── 4. Build Electron Windows installer ──────────────────────────────
      - name: Build Electron (Windows)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm ci
          if ("${{ github.event_name }}" -eq "push" -or "${{ github.event.inputs.publish }}" -eq "true") {
            npx electron-builder --win --publish always
          } else {
            npx electron-builder --win --publish never
          }
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist_electron/*.exe
            dist_electron/latest.yml
          if-no-files-found: error

  # ── macOS .dmg ───────────────────────────────────────────────────────────────
  build-mac:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 1. Build React frontend ───────────────────────────────────────────
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── 2. Build PyInstaller backend ──────────────────────────────────────
      - name: Build backend
        working-directory: backend
        run: |
          pip3 install -r requirements.txt -q
          pip3 install pyinstaller -q
          pyinstaller scriptovideo.spec --noconfirm

      # ── 3. Download FFmpeg for macOS ──────────────────────────────────────
      - name: Download FFmpeg (macOS)
        run: |
          brew install ffmpeg --quiet || true
          mkdir -p ffmpeg_bin
          BREW_FFMPEG="$(brew --prefix)/bin/ffmpeg"
          if [ -f "$BREW_FFMPEG" ]; then
            cp "$BREW_FFMPEG" ffmpeg_bin/ffmpeg
            chmod +x ffmpeg_bin/ffmpeg
          fi

      # ── 4. Build Electron macOS DMG ───────────────────────────────────────
      - name: Build Electron (macOS)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Code-signing is skipped — add CSC_LINK / CSC_KEY_PASSWORD here
          # when you have an Apple Developer certificate
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm ci
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.publish }}" == "true" ]]; then
            npx electron-builder --mac --publish always
          else
            npx electron-builder --mac --publish never
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            dist_electron/*.dmg
            dist_electron/latest-mac.yml
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ScriptToVideo ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/windows-installer/*.exe
            artifacts/windows-installer/latest.yml
            artifacts/macos-dmg/*.dmg
            artifacts/macos-dmg/latest-mac.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
